<!DOCTYPE html>
<html lang="vi">

<head>

    <title>Gửi cậu...</title>
    <link rel="stylesheet" href="style.css">
    <!-- Thư viện Confetti để tạo hiệu ứng pháo giấy -->

</head>

<body>
